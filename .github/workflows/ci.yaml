name: CI/CD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  DOCKERHUB_USER: petabait
  IMAGE_NAME: petabait/spring-petclinic

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Run tests
        run: ./mvnw test

      - name: Build jar
        run: ./mvnw package -DskipTests

      - name: Set image tag
        id: tag
        run: echo "tag=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

      - name: Login to Docker Hub
        if: github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        if: github.ref == 'refs/heads/main'
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ env.IMAGE_NAME }}:${{ steps.tag.outputs.tag }}

      - name: Update Helm values in GitOps repo
        if: github.ref == 'refs/heads/main'
        run: |
          git clone https://${{ secrets.GH_TOKEN }}@github.com/bohdan-ihnatenko/project-x.git gitops
          cd gitops
          sed -i 's|tag: .*|tag: "${{ steps.tag.outputs.tag }}"|' helm/petclinic/values.yaml
          git config user.email "ci@github-actions"
          git config user.name "GitHub Actions"
          git add helm/petclinic/values.yaml
          git commit -m "ci: update petclinic image tag to ${{ steps.tag.outputs.tag }}"
          git push